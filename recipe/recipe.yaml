context:
  name: hf-xet
  version: "1.1.3"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/h/hf-xet/hf_xet-${{ version }}.tar.gz
  sha256: a5f09b1dd24e6ff6bcedb4b0ddab2d81824098bb002cf8b4ffa780545fa348c3

build:
  number: 3
  script:
    - if: unix
      then: |
        # https://github.com/rust-lang/cargo/issues/10583#issuecomment-1129997984
        export CARGO_NET_GIT_FETCH_WITH_CLI=true

        # Optimize the Cargo build
        export CARGO_PROFILE_RELEASE_STRIP=symbols
        export CARGO_PROFILE_RELEASE_LTO=fat

        # Deal with OpenSSL vendoring
        export OPENSSL_DIR="$PREFIX"
        export OPENSSL_NO_VENDOR=1

        pushd hf_xet
        cargo-bundle-licenses --format yaml --output ${SRC_DIR}/THIRDPARTY.yml
        # maturin build --release --features openssl_vendored
        popd

        # https://github.com/PyO3/maturin/issues/2489#issuecomment-2812021105
        mkdir python
        $PYTHON -m pip install . -vv --no-deps --no-build-isolation

    - if: win
      then: |
        REM https://github.com/rust-lang/cargo/issues/10583#issuecomment-1129997984
        set CARGO_NET_GIT_FETCH_WITH_CLI=true

        REM Optimize the Cargo build
        set CARGO_PROFILE_RELEASE_STRIP=symbols
        set CARGO_PROFILE_RELEASE_LTO=fat

        REM Deal with OpenSSL vendoring
        set OPENSSL_DIR=%LIBRARY_PREFIX%
        set OPENSSL_NO_VENDOR=1

        pushd hf_xet
        cargo-bundle-licenses ^
            --format yaml ^
            --output %SRC_DIR%\THIRDPARTY.yml ^
            || goto :error
        popd

        REM https://github.com/PyO3/maturin/issues/2489#issuecomment-2812021105
        mkdir python
        %PYTHON% -m pip install . -vv --no-deps --no-build-isolation

  skip: not (match(python, python_min ~ ".*") and is_abi3)
  python:
    version_independent: true

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - maturin >=1.7,<2.0

    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - pkg-config
  host:
    - python
    - python-abi3
    - pip
    - maturin >=1.7,<2.0
    - openssl
  run:
    - python

tests:
  - python:
      imports:
        - hf_xet
      python_version: "${{ python_min ~ '.*' }}"
      pip_check: true
  - script:
      - if: unix and is_abi3
        then: abi3audit ${{ SP_DIR }}/hf_xet/hf_xet.abi3.so -s -v --assume-minimum-abi3 ${{ python_min }}
      - if: win and is_abi3
        then: abi3audit ${{ SP_DIR }}/hf_xet/hf_xet.pyd -s -v --assume-minimum-abi3 ${{ python_min }}
    requirements:
      run:
        - abi3audit

about:
  homepage: https://pypi.org/project/hf-xet/
  repository: https://github.com/huggingface/xet-core
  summary: |
    xet-core enables huggingface_hub to utilize xet storage for uploading and
    downloading to HF Hub. Xet storage provides chunk-based deduplication,
    efficient storage/retrieval with local disk caching, and backwards
    ompatibility with Git LFS. This library is not meant to be used directly,
    and is instead intended to be used from huggingface_hub.
    <br/>
    hf_xet: Python integration with Rust code, uses maturin to build hfxet
    Python package. Main integration with HF Hub Python package.
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - shermansiu
